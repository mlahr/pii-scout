services:
  pii-api:
    build:
      context: .
      args:
        SPACY_MODEL: en_core_web_lg
    ports:
      - "8000:8000"
    environment:
      - PII_MODEL_PROFILE=accurate
      - PII_LOG_LEVEL=INFO
      - PII_MAX_TEXT_LENGTH=500000
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
