# PII Detection Configuration
# Copy this file to pii_config.yaml and customize as needed.
#
# External Sources:
# Patterns, context keywords, and name lists can be loaded from external files
# instead of being defined inline. Use the "source" key to specify a file path.
#
# Supported file formats:
# - .txt: One item per line, empty lines and # comments are ignored
# - .json: JSON array of strings ["item1", "item2", ...]
#
# Paths are relative to this config file's location, or can be absolute.
#
# Example with external sources:
#   patterns:
#     SSN:
#       source: "config/patterns/ssn.txt"  # load from file
#     EMAIL:
#       - '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'  # inline
#
#   name_lists:
#     first_names:
#       source: "/path/to/first_names.txt"
#     last_names:
#       source: "/path/to/last_names.txt"
#     stopwords:
#       source: "/path/to/stopwords-en.json"

# Model configuration
# Profile options: spacy-fast, spacy-accurate, piiranha, ollama, openrouter
# Comma-separated for multi-model: "spacy-fast,piiranha"
# CLI options (--models, --ollama-base-url, etc.) override these when provided
models:
  profile: spacy-accurate
  piiranha:
    # HuggingFace model ID or local directory path
    # Environment variable PIIRANHA_MODEL_PATH overrides this setting
    model_path: iiiorg/piiranha-v1-detect-personal-information
  ollama:
    base_url: http://localhost:11434
    model: llama3.2
  openrouter:
    base_url: https://openrouter.ai/api/v1
    model: ""  # Required when profile is openrouter

# Logging configuration
# Environment variable PII_LOG_LEVEL overrides the level setting
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Gateway configuration (early-exit logic)
# When enabled: true, gateway is ON by default (use --no-gateway to disable)
gateway:
  enabled: true
  tests:
    - name: consecutive_digits
      enabled: true
      threshold: 5  # Minimum consecutive digits to trigger full detection
    - name: name_dictionary
      enabled: true
      threshold: null  # Not used for name dictionary
    - name: address_signals
      enabled: true
      threshold: 4  # Minimum score to trigger (signals add 1-3 points each)

# Detection pipeline configuration
detection:
  detector_order:
    - ner     # NER model (SpaCy/Piiranha/Ollama)
    - regex   # Regex pattern matching
    - dict    # Dictionary-based name detection
  passes:
    - raw         # Run on original text
    - normalized  # Run on normalized text (collapsed whitespace, de-hyphenated)

# Regex patterns per entity type
patterns:
  SSN:
    - '\b\d{3}-\d{2}-\d{4}\b'       # Hyphen-separated: 123-45-6789
    - '\b\d{3} \d{2} \d{4}\b'       # Space-separated: 123 45 6789
    - '\b\d{3}\.\d{2}\.\d{4}\b'    # Dot-separated: 123.45.6789
    - '\b\d{9}\b'                   # Bare 9 digits: 123456789
  PHONE_NUMBER:
    source: "config/patterns/phone_number.txt"
  DATE:
    source: "config/patterns/date.txt"
  ACCOUNT_NUMBER:
    # Use 10+ digits to avoid confusion with 9-digit SSNs
    - '\b\d{10,17}\b'              # Generic 10-17 digit number
    - '\b[A-Z]{2}\d{10,}\b'        # IBAN-like: 2 letters + 10+ digits
  ADDRESS:
    - '\b\d{1,5}\s+[A-Za-z0-9 .]+\s+(?:St|Street|Rd|Road|Ave|Avenue|Blvd|Lane|Ln|Drive|Dr|Way|Court|Ct|Place|Pl|Circle|Cir)\b(?:.{0,20}(?:Apt|Unit|#|Suite|Ste|Floor|Fl)\s*\w+)?(?:.{0,30}(?:\d{5}(?:-\d{4})?)?)?'
  EMAIL:
    - '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'

# Context keywords for boosting scores
#
# These keywords serve two purposes:
# 1. Score boosting: When a keyword appears near a detected entity, its confidence
#    score is increased by `scoring_rules.context_boost`
# 2. Type disambiguation: ACCOUNT_NUMBER keywords are used to disambiguate 9-digit
#    numbers between SSN and ACCOUNT_NUMBER. If "account", "acct", etc. appear near
#    a 9-digit number, it's classified as ACCOUNT_NUMBER instead of SSN.
#
# Load from external files for comprehensive keyword lists
context_keywords:
  SSN:
    source: "config/keywords/ssn.txt"
  PHONE_NUMBER:
    source: "config/keywords/phone_number.txt"
  BIRTHDATE:
    source: "config/keywords/birthdate.txt"
  ACCOUNT_NUMBER:
    # Also used for 9-digit SSN vs ACCOUNT_NUMBER disambiguation
    source: "config/keywords/account_number.txt"
  ADDRESS:
    source: "config/keywords/address.txt"
  PERSON:
    source: "config/keywords/person.txt"

# Base confidence scores per entity type
#
# These scores are assigned to detected entities based on their type.
# Used in multiple places:
# - Initial score for regex-detected entities
# - Score assigned when type disambiguation retypes an entity
#   (e.g., 9-digit SSN → ACCOUNT_NUMBER uses the ACCOUNT_NUMBER score)
scores:
  PERSON: 0.80
  LOCATION: 0.75
  SSN: 0.95
  PHONE_NUMBER: 0.85
  DATE: 0.75
  BIRTHDATE: 0.75
  ACCOUNT_NUMBER: 0.80  # Also used when 9-digit SSN is retyped to ACCOUNT_NUMBER
  ADDRESS: 0.70
  EMAIL: 0.90
  CREDIT_CARD_NUMBER: 0.95
  DRIVERS_LICENSE: 0.90
  ID_CARD: 0.90
  TAX_NUMBER: 0.90
  USERNAME: 0.85
  PASSWORD: 0.95
  ZIPCODE: 0.75

# Scoring rules for adjustments
scoring_rules:
  context_boost: 0.10       # Added to score when context keyword found
  multi_model_boost: 0.10   # Added when multiple NER models agree on same entity
  max_score: 0.99           # Maximum allowed score
  account_no_context_score: 0.40  # ACCOUNT_NUMBER score without context keywords
  account_min_digits: 10    # Minimum digits for ACCOUNT_NUMBER without context

# Luhn-based retyping for ACCOUNT_NUMBER candidates
#
# This step reduces false positives when long digit runs are actually payment card numbers.
# When enabled, ACCOUNT_NUMBER detections that pass the Luhn checksum are retyped to target_type.
#
# - enabled: master switch for Luhn retyping
# - min_length/max_length: digit length window considered for Luhn (typical cards: 13–19)
# - require_no_account_context: if true, do NOT retype when account keywords are nearby
# - target_type: type to retype into (default: CREDIT_CARD_NUMBER)
luhn_retype:
  enabled: true
  min_length: 13
  max_length: 19
  require_no_account_context: true
  target_type: CREDIT_CARD_NUMBER

# Post-detection filters
#
# These filters run after detection (NER/regex/dict) and before merging.
# They are useful for trimming noisy model outputs without changing regex rules.
post_filters:
  address_ner:
    enabled: true
    sources: [ner]            # Only apply to NER-based ADDRESS spans
    min_single_token_length: 4  # Drop single-token ADDRESS spans shorter than this
    allow_single_token_digits: true  # Keep short single-token spans if they contain digits
    allowed_single_tokens: []   # Lowercase whitelist for single-token spans
    require_digit: false        # If true, require a digit in the span
    require_suffix: false       # If true, require a street suffix in the span
    suffixes:                  # Used when require_suffix is true (lowercase)
      - st
      - street
      - rd
      - road
      - ave
      - avenue
      - blvd
      - lane
      - ln
      - drive
      - dr
      - way
      - court
      - ct
      - place
      - pl
      - circle
      - cir

# Context window size (characters before/after entity to search for keywords)
#
# This value controls how far before and after a detected entity we look for:
# - Positive context keywords (for score boosting)
# - Negative context keywords (for suppressing false positives)
# - Type disambiguation keywords (e.g., "account" near 9-digit numbers)
#
# Larger values catch more context but may pick up unrelated keywords.
# Smaller values are more precise but may miss relevant context.
context_window: 40

# Name lists for dictionary detector (optional).
# Name lists are not bundled in this public repository; provide your own
# local files if you enable the dictionary detector.
# name_lists:
#   first_names:
#     source: "/path/to/first_names.txt"
#   last_names:
#     source: "/path/to/last_names.txt"
#   stopwords:
#     source: "/path/to/stopwords-en.json"
